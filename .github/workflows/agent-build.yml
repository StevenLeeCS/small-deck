name: Build Small Deck

# Builds the Tauri desktop app for macOS, Windows and Linux.
#  • Push a tag like `v0.1.0`  → builds all three + drafts a GitHub Release with
#    the installers attached (both the native versioned names AND stable names
#    like `Small-Deck-Windows.exe` so the website's download links never rot).
#  • Run manually (Actions ▸ Run workflow) → builds all three and uploads the
#    installers as downloadable workflow artifacts (no release).
#
# After a tag build, PUBLISH the drafted release so that the
# `releases/latest/download/<name>` links used on the website go live.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

# tauri-action creates the GitHub Release; the stable-name step uploads to it.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # One universal binary covering Apple Silicon + Intel Macs.
          - platform: macos-latest
            args: '--target universal-apple-darwin'
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
            rust-targets: ''
          - platform: windows-latest
            args: ''
            rust-targets: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      # Tauri v2 + tray + rusb (libusb) system libraries — Linux only.
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            libusb-1.0-0-dev \
            libudev-dev \
            patchelf file

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          # Bump when native link config changes (e.g. vendored libusb) so a
          # stale cache can't bring back the old dynamic libusb link.
          prefix-key: "v2-static-libusb"

      - name: Install npm dependencies
        run: npm ci

      # The derived icon set is gitignored; regenerate it from the tracked
      # source image so the bundle has every icon tauri.conf.json references.
      - name: Generate app icons
        run: npm run tauri icon src-tauri/icons/icon-source.png

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # ── Optional signing/notarization (add as repo secrets to enable) ──
          # macOS: APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD /
          #        APPLE_SIGNING_IDENTITY / APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID
          # Windows (Authenticode): configured via tauri.conf if you add a cert.
        with:
          projectPath: .
          args: ${{ matrix.args }}
          # When triggered by a tag, publish a draft release with the installers.
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: 'Small Deck ${{ github.ref_name }}'
          releaseDraft: true
          prerelease: false

      # ── Attach a STABLE-named copy of the primary installer to the release ──
      # The website links to releases/latest/download/Small-Deck-<OS>.<ext>, so
      # those URLs must not change between versions. tauri's native filenames
      # include the version (e.g. "Small Deck_0.1.0_x64-setup.exe"), so we copy
      # the chosen installer to a fixed name and upload it alongside.
      - name: Attach stable-named installer (Windows .exe)
        if: matrix.platform == 'windows-latest' && github.ref_type == 'tag'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $f = Get-ChildItem src-tauri/target/release/bundle/nsis/*-setup.exe | Select-Object -First 1
          Copy-Item $f.FullName "Small-Deck-Windows.exe"
          gh release upload "${{ github.ref_name }}" "Small-Deck-Windows.exe" --clobber

      - name: Attach stable-named installer (macOS .dmg)
        if: matrix.platform == 'macos-latest' && github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          f=$(ls src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg | head -1)
          cp "$f" "Small-Deck-macOS.dmg"
          gh release upload "${{ github.ref_name }}" "Small-Deck-macOS.dmg" --clobber

      - name: Attach stable-named installer (Linux .AppImage)
        if: matrix.platform == 'ubuntu-22.04' && github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          f=$(ls src-tauri/target/release/bundle/appimage/*.AppImage | head -1)
          cp "$f" "Small-Deck-Linux.AppImage"
          gh release upload "${{ github.ref_name }}" "Small-Deck-Linux.AppImage" --clobber

      # Always keep the installers as workflow artifacts (download from the run),
      # independent of whether the Release upload succeeds.
      - name: Upload installers as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: smalldeck-${{ matrix.platform }}
          path: |
            src-tauri/target/release/bundle/**
            src-tauri/target/universal-apple-darwin/release/bundle/**
          if-no-files-found: ignore
